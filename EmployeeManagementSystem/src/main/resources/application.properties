# =============================================
#   APPLICATION CONFIGURATION
# =============================================
spring.application.name=EmployeeManagementSystem
server.port=8080

# =============================================
#   POSTGRESQL DATABASE CONFIGURATION
#   -> Change username/password to yours
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
#   JPA / HIBERNATE CONFIGURATION
# =============================================
# create-drop : creates table on start, drops on stop (use for dev)
# update      : updates existing table (use for testing)
# validate    : only validates (use for production)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
#   LOGGING
# =============================================
logging.level.com.ems=DEBUG
logging.level.org.hibernate.SQL=DEBUG
